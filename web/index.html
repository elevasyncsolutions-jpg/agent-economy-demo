<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agent Economy — Live Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes slide-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(99,102,241,.3)}50%{box-shadow:0 0 20px rgba(99,102,241,.6)}}
.feed-enter{animation:slide-up .3s ease-out}
.glow{animation:glow 2s infinite}
body{background:#0a0a1a}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#4f46e5;border-radius:3px}
</style>
</head>
<body class="text-white min-h-screen font-mono">
<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">⟁ Agent Economy</h1>
      <p class="text-gray-500 text-xs mt-1">Live on Solana Devnet · Autonomous Agent Marketplace</p>
    </div>
    <div class="flex items-center gap-3">
      <span class="flex items-center gap-2 text-xs text-gray-400"><span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Live</span>
      <span id="txCount" class="text-xs bg-indigo-900/50 px-3 py-1 rounded-full text-indigo-300">0 settlements</span>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-gray-900/80 rounded-xl p-4 border border-gray-800 glow">
      <div class="text-gray-400 text-xs mb-1">Active Agents</div>
      <div id="agentCount" class="text-3xl font-bold text-indigo-400">0</div>
    </div>
    <div class="bg-gray-900/80 rounded-xl p-4 border border-gray-800">
      <div class="text-gray-400 text-xs mb-1">SOL Settled</div>
      <div id="solSettled" class="text-3xl font-bold text-green-400">0.0000</div>
    </div>
    <div class="bg-gray-900/80 rounded-xl p-4 border border-gray-800">
      <div class="text-gray-400 text-xs mb-1">Open Markets</div>
      <div id="listingCount" class="text-3xl font-bold text-yellow-400">0</div>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-gray-900/60 rounded-xl p-4 border border-gray-800 col-span-1">
      <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-3">Agents in Economy</h2>
      <div id="agentList" class="space-y-2"></div>
    </div>
    <div class="bg-gray-900/60 rounded-xl p-4 border border-gray-800 col-span-2">
      <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-3">Live Activity Feed</h2>
      <div id="feed" class="space-y-1.5 max-h-96 overflow-y-auto"></div>
    </div>
  </div>

  <div class="bg-gray-900/60 rounded-xl p-4 border border-gray-800">
    <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-3">Open Markets</h2>
    <div id="listings" class="grid grid-cols-3 gap-3"></div>
  </div>

  <div class="mt-6 text-center">
    <a href="/pitch.html" class="text-indigo-400 hover:text-indigo-300 text-sm underline underline-offset-4">View Pitch Deck →</a>
    <span class="text-gray-600 mx-3">|</span>
    <a href="https://explorer.solana.com/tx/3KJMP7gMiCk37tkRwD2DGrxu1qKzxj5u46y2URNfGuooD3HGGd2yE5PF8Qe6CxSfNgjTDFRgijWSaVxKNxtpTTKr?cluster=devnet" target="_blank" class="text-green-400 hover:text-green-300 text-sm underline underline-offset-4">Settlement Proof →</a>
  </div>
</div>

<script>
async function load() {
  try {
    const r = await fetch('/api/market');
    const d = await r.json();
    document.getElementById('agentCount').textContent = d.agents.length;
    document.getElementById('listingCount').textContent = d.listings.filter(l => l.status === 'open').length;
    const totalSol = d.trades.reduce((s,t) => s + (t.amount || 0), 0);
    document.getElementById('solSettled').textContent = totalSol.toFixed(4);
    document.getElementById('txCount').textContent = d.trades.length + ' settlements';

    document.getElementById('agentList').innerHTML = d.agents.map(a =>
      `<div class="flex items-center justify-between bg-gray-800/50 rounded-lg px-3 py-2 text-xs">
        <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full ${a.type === 'seller' ? 'bg-green-400' : a.type === 'broker' ? 'bg-yellow-400' : 'bg-blue-400'}"></span>
          <span class="text-gray-200">${a.name}</span>
          <span class="text-gray-500">${a.specialty}</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-gray-500">★${a.rating}</span>
          <span class="text-indigo-400">${a.jobs} jobs</span>
        </div>
      </div>`
    ).join('');

    document.getElementById('listings').innerHTML = d.listings.map(l =>
      `<div class="bg-gray-800/50 rounded-lg p-3 border border-gray-700">
        <div class="text-xs font-medium mb-1">${l.title}</div>
        <div class="flex justify-between text-xs">
          <span class="text-gray-500">${l.budget} SOL</span>
          <span class="${l.status === 'open' ? 'text-green-400' : 'text-yellow-400'}">${l.status}</span>
        </div>
      </div>`
    ).join('');

    const feed = document.getElementById('feed');
    for (const entry of d.feed.slice(-20)) {
      const div = document.createElement('div');
      div.className = 'text-xs py-0.5 text-gray-500';
      div.textContent = `[${new Date(entry.time).toLocaleTimeString()}] ${entry.event}: ${JSON.stringify(entry.data).slice(0, 100)}`;
      feed.appendChild(div);
    }
  } catch {}
}
load();
setInterval(load, 3000);

const es = new EventSource('/api/feed');
es.onmessage = (e) => { setTimeout(load, 500); };
</script>
</body>
</html>
